# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes 4;
worker_rlimit_nofile 40000;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 8192;
}

stream {
    upstream backend {
        least_conn;
        server 192.168.0.140:9345 max_fails=1 fail_timeout=2s;
        #server 192.168.0.141:9345 max_fails=1 fail_timeout=2s;
        #server 192.168.0.142:9345 max_fails=1 fail_timeout=2s;
    }

    # This server accepts all traffic to port 9345 and passes it to the upstream.
    # Notice that the upstream name and the proxy_pass need to match.
    server {
        listen 9345;
        proxy_pass backend;
    }
    upstream rancher_api {
        least_conn;
        server 192.168.0.140:6443 max_fails=1 fail_timeout=2s;
        #server 192.168.0.141:6443 max_fails=1 fail_timeout=2s;
        #server 192.168.0.142:6443 max_fails=1 fail_timeout=2s;
    }
    server {
        listen 6443;
        proxy_pass rancher_api;
    }
    upstream rancher_http {
        least_conn;
        server 192.168.0.140:80 max_fails=1 fail_timeout=2s;
        #server 192.168.0.141:80 max_fails=1 fail_timeout=2s;
        #server 192.168.0.142:80 max_fails=1 fail_timeout=2s;
    }
    server {
        listen 80;
        proxy_pass rancher_http;
    }
    upstream rancher_https {
        least_conn;
        server 192.168.0.140:443 max_fails=1 fail_timeout=2s;
        #server 192.168.0.141:443 max_fails=1 fail_timeout=2s;
        #server 192.168.0.142:443 max_fails=1 fail_timeout=2s;=
    }
    server {
        listen 443;
        proxy_pass rancher_https;
        ssl_certificate "/etc/ssl/certs/skynet.com.br-server-cert.pem";
        ssl_certificate_key "/etc/ssl/certs/skynet.com.br-server-key.pem";
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 10m;
        ssl_ciphers PROFILE=SYSTEM;
        ssl_prefer_server_ciphers on;
    }
}


