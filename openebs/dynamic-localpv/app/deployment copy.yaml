apiVersion: apps/v1
kind: Deployment
metadata:  
  labels:
    app: ubuntu-localpv
  name: ubuntu-localpv
  namespace: openebs-localpv-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ubuntu-localpv
  strategy: {}
  template:
    metadata:      
      labels:
        app: ubuntu-localpv
    spec:
      containers:
      - command:
        - sh
        - -c
        - 'date >> /mnt/data/date.txt; hostname >> /mnt/data/hostname.txt; sync; sleep 5; sync; tail -f /dev/null;'
      - image: ubuntu
        name: ubuntu                
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
          requests:
            cpu: "1"
            memory: "1Gi"
        volumeMounts:
        - mountPath: /mnt/data
          name: openebs-localpv-vol
      volumes:
        - name: openebs-localpv-vol
          persistentVolumeClaim:
            claimName: openebs-localpv-vol

