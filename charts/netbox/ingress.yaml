apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-netbox
  namespace: netbox
spec:
  rules:
  - host: netbox.skynet.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: netbox
            port:
              number: 80           
  ingressClassName: nginx