apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netbox
  namespace: argocd
spec:
  project: default
  source:
    chart: netbox
    repoURL: https://charts.boo.tc    
    helm:
      releaseName: netbox
  destination:
    server: "https://kubernetes.default.svc"
    namespace: netbox
