apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: consul
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hashicorp/consul-k8s.git
    targetRevision: main
    path: charts/consul
  destination:
    server: https://kubernetes.default.svc
    namespace: consul
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  helm:
    releaseName: consul
    valueFiles:
      - values.yaml
