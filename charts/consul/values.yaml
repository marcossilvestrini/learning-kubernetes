global:
  nameOverride: consul
  fullnameOverride: consul

server:
  enabled: true

ui:
  enabled: true

client:
  enabled: true

connectInject:
  enabled: true

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx # ou a classe do ingress desejada
  hosts:
    - host: consul.skynet.com.br
      paths:
        - /
  tls: []
