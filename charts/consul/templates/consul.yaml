apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: consul
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: consul
  source:
    repoURL: https://github.com/marcossilvestrini/learning-kubernetes.git
    targetRevision: HEAD
    path: 
        charts/consul/official     
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
