apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://charts.bitnami.com/bitnami"
    targetRevision: "4.7.15"
    path: metallb
    helm:
      valueFiles:
      - charts/metallb/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb
