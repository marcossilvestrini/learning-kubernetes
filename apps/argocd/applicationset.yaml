apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: silvestrini-applicationset
  namespace: argocd
spec:
  generators:
  - list:
      elements:
        - appName: argocd
          namespace: argocd
        - appName: longhorn
          namespace: longhorn
        - appName: metallb
          namespace: metallb
        - appName: app-silvestrini
          namespace: silvestrini
  template:
    metadata:
      name: "{{appName}}"
      annotations:
        argocd.argoproj.io/manifest-generate-paths: ".;.."
    spec:
      project: default
      source:
        repoURL: https://github.com/marcossilvestrini/learning-kubernetes.git
        targetRevision: HEAD
        path: "charts/{{appName}}"
        helm:
          # Release name override (defaults to application name)
          releaseName: "{{appName}}"
          valueFiles:
          - "values.yaml"
          #- "../../values/{{name}}/{{appName}}/values.yaml"
      destination:
        # Default base cluster
        name: in-cluster
        namespace: "{{namespace}}"
      syncPolicy:
        # automated:
        #   prune: true
        #   selfHeal: true
        syncOptions:
          - CreateNamespace=true