# Reference https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml

kube-prometheus-stack:
  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
        slack_api_url: ''
      route:
        group_by: ['alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: 'general-monitoring'
        routes:
        - receiver: 'critical-monitoring'
          matchers:
            - severity=~"critical|high"
        - receiver: 'warning-monitoring'
          matchers:
            - severity="warning"
      receivers:
      - name: 'critical-monitoring'
        slack_configs:
        - channel: '#'
          send_resolved: true
          title: '{{ template "slack.title" . }}'
          text: '{{ template "slack.text" . }}'
      - name: 'warning-monitoring'
        slack_configs:
        - channel: '#cloud-rlen-solutions-temp-warning'
          send_resolved: true
          title: '{{ template "slack.title" . }}'
          text: '{{ template "slack.text" . }}'
      - name: 'general-monitoring'
        slack_configs:
        - channel: '#alertas-cloud-rlen-solutions-temp'
          send_resolved: true
          title: '{{ template "slack.title" . }}'
          text: '{{ template "slack.text" . }}'
      templates:
      - '/etc/alertmanager/config/*.tmpl'
  
    templateFiles: 
  #
  ## An example template:
     template_1.tmpl: |-
        {{ define "slack.title" }}
        {{- if ne .Status "firing" -}}
        :white_check_mark:
        {{- else if eq .CommonLabels.severity "critical" -}}
        :fire:
        {{- else if eq .CommonLabels.severity "high" -}}
        :rotating_light:
        {{- else if eq .CommonLabels.severity "warning" -}}
        :warning:
        {{- end -}}
        {{ .Status | toUpper -}}{{- if eq .Status "firing" }}:{{ .Alerts.Firing | len -}}{{- end }} - {{ .CommonLabels.alertname -}}
        {{- end -}}

        {{ define "slack.text" }}
        {{ range .Alerts }}
        {{ if gt (len .Annotations) 0 }}
        *Sumário*: {{ .Annotations.summary}}
        *Descrição*: {{ .Annotations.description }}
        *Runbook*: {{ .Annotations.runbook_url }}
        *Detalhes*:
        {{ range .Labels.SortedPairs }}• {{ .Name }}: `{{ .Value }}`
        {{ end }}
        {{ end }}
        {{ end }}
        {{ end }}

  kubeScheduler:
    enabled: false

  kubeControllerManager:
    enabled: false

  grafana:
    enabled: false

  defaultRules:
    create: true
    rules:
      kubeProxy: false

  prometheus-node-exporter:
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
      